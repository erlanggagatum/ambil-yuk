services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ambilyuk_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./.env:/var/www/html/.env
      - app_public:/var/www/html/public
      - storage_data:/var/www/html/storage/app/public
    environment:
      APP_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-ambilyuk}
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - ambilyuk

  nginx:
    image: nginx:1.25-alpine
    container_name: ambilyuk_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - app_public:/var/www/html/public:ro
      - storage_data:/var/www/html/storage/app/public:ro
    depends_on:
      - app
    networks:
      - ambilyuk

  mysql:
    image: mysql:8.0
    container_name: ambilyuk_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-ambilyuk}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ALLOW_EMPTY_PASSWORD: "no"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-secret}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ambilyuk

volumes:
  mysql_data:
    driver: local
  storage_data:
    driver: local
  app_public:
    driver: local

networks:
  ambilyuk:
    driver: bridge
